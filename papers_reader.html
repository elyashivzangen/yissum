<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HUJI Research Monitor</title>
<style>
  :root {
    --bg:#0f1117; --card:#1a1d2e; --accent:#6c63ff;
    --accent2:#a78bfa; --text:#e2e8f0; --muted:#8892a4;
    --border:#2d3148; --tag-bg:#23263a; --green:#22c55e;
    --yellow:#eab308; --red:#ef4444;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
  header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  header h1{font-size:1.25rem;font-weight:700;color:var(--accent2)}
  header span{font-size:.8rem;color:var(--muted)}
  .controls{padding:16px 24px;display:flex;flex-direction:column;gap:12px}
  .row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .row label{font-size:.75rem;color:var(--muted);min-width:52px;text-transform:uppercase;letter-spacing:.05em}
  .chip{padding:4px 12px;border-radius:999px;border:1px solid var(--border);background:var(--tag-bg);
    color:var(--muted);font-size:.75rem;cursor:pointer;transition:all .15s}
  .chip:hover,.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .search-row{display:flex;gap:8px}
  input[type=text]{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;
    padding:8px 14px;color:var(--text);font-size:.875rem;outline:none}
  input[type=text]:focus{border-color:var(--accent)}
  .sort-select{background:var(--card);border:1px solid var(--border);border-radius:8px;
    padding:8px 14px;color:var(--text);font-size:.875rem;cursor:pointer;outline:none}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;padding:0 24px 32px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;
    display:flex;flex-direction:column;gap:10px;transition:border-color .2s}
  .card:hover{border-color:var(--accent)}
  .card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .score{min-width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:.95rem}
  .score-high{background:#14532d;color:var(--green)}
  .score-mid{background:#713f12;color:var(--yellow)}
  .score-low{background:#450a0a;color:var(--red)}
  .title{font-size:.9rem;font-weight:600;line-height:1.4;color:var(--text)}
  .meta{font-size:.75rem;color:var(--muted)}
  .summary{font-size:.8rem;color:#b0bac8;line-height:1.5}
  .opportunity{font-size:.8rem;background:#1e1b4b;border-left:3px solid var(--accent);
    padding:6px 10px;border-radius:0 6px 6px 0;color:var(--accent2);line-height:1.4}
  .tags{display:flex;flex-wrap:wrap;gap:6px}
  .tag{padding:2px 10px;border-radius:999px;background:var(--tag-bg);border:1px solid var(--border);
    font-size:.7rem;color:var(--muted)}
  .actions{display:flex;gap:8px;margin-top:4px}
  .btn{padding:5px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;
    color:var(--muted);font-size:.75rem;cursor:pointer;transition:all .15s;text-decoration:none;display:inline-block}
  .btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
  .count{font-size:.8rem;color:var(--muted);padding:0 24px 8px}
  .empty{text-align:center;padding:60px 24px;color:var(--muted)}
  @media(max-width:600px){.grid{grid-template-columns:1fr;padding:0 12px 24px}.controls{padding:12px}}
</style>
</head>
<body>
<header>
  <h1>HUJI Research Monitor</h1>
  <span id="updated"></span>
</header>
<div class="controls">
  <div class="row search-row">
    <input type="text" id="search" placeholder="Search titles, summaries, opportunities..."/>
    <select class="sort-select" id="sort">
      <option value="score">Score ↓</option>
      <option value="date">Date ↓</option>
    </select>
  </div>
  <div class="row">
    <label>Score</label>
    <button class="chip active" data-filter="score" data-val="all">All</button>
    <button class="chip" data-filter="score" data-val="8">8+</button>
    <button class="chip" data-filter="score" data-val="6">6+</button>
  </div>
  <div class="row">
    <label>Field</label>
    <button class="chip active" data-filter="field" data-val="all">All</button>
    <button class="chip" data-filter="field" data-val="Drug Discovery">Drug Discovery</button>
    <button class="chip" data-filter="field" data-val="Medical Device">Medical Device</button>
    <button class="chip" data-filter="field" data-val="Diagnostics">Diagnostics</button>
    <button class="chip" data-filter="field" data-val="Vaccines">Vaccines</button>
    <button class="chip" data-filter="field" data-val="AgriTech">AgriTech</button>
    <button class="chip" data-filter="field" data-val="FoodTech">FoodTech</button>
    <button class="chip" data-filter="field" data-val="Materials">Materials</button>
    <button class="chip" data-filter="field" data-val="Clean Energy">Clean Energy</button>
    <button class="chip" data-filter="field" data-val="Software/AI">Software/AI</button>
    <button class="chip" data-filter="field" data-val="Quantum">Quantum</button>
    <button class="chip" data-filter="field" data-val="Neuroscience">Neuroscience</button>
    <button class="chip" data-filter="field" data-val="Genomics">Genomics</button>
    <button class="chip" data-filter="field" data-val="Imaging">Imaging</button>
    <button class="chip" data-filter="field" data-val="Synthetic Biology">Synthetic Biology</button>
    <button class="chip" data-filter="field" data-val="Proteomics">Proteomics</button>
    <button class="chip" data-filter="field" data-val="Immunology">Immunology</button>
    <button class="chip" data-filter="field" data-val="Clinical">Clinical</button>
    <button class="chip" data-filter="field" data-val="Other">Other</button>
  </div>
</div>
<div class="count" id="count"></div>
<div class="grid" id="grid"></div>
<script>
const papers = [{"id": "epmc_41857451", "title": "ctDNA monitoring using tumor-informed copy number analysis.", "authors": ["Ze Zhou", "Ros Cutts", "Sarah Hrebien"], "journal": "", "date": "2026-03-19", "url": "https://europepmc.org/article/MED/41857451", "score": 9, "summary": "This research presents a new bioinformatics method, informCNA, that significantly improves the sensitivity of detecting circulating tumor DNA (ctDNA) in blood samples. By using a patient's tumor or pre-treatment plasma as a reference, informCNA can detect cancer signals at much lower levels than existing methods, potentially enabling earlier detection of recurrence.", "opportunity": "Developing informCNA as a CLIA-certified test or licensing the software to diagnostic companies offers a compelling commercial opportunity for improved cancer monitoring and personalized medicine.", "fields": ["Diagnostics", "Software/AI", "Genomics", "Clinical"]}, {"id": "epmc_41834792", "title": "4D printing of fully programmable sheets of digital metamaterials.", "authors": ["Ido Levin", "Ela Sachyani", "Rama Lieberman"], "journal": "", "date": "2026-03-16", "url": "https://europepmc.org/article/MED/41834792", "score": 8, "summary": "Researchers at Hebrew University have developed a new 4D printing method to create sheets of material that can precisely change shape on demand. This is achieved by carefully arranging 'active' and 'passive' components within the material, allowing for independent control of both the overall form and its curvature.", "opportunity": "This technology offers a pathway to creating adaptable materials for soft robotics, advanced medical devices, and dynamically adjustable structures in various industries, potentially disrupting traditional manufacturing approaches.", "fields": ["Materials", "Medical Device", "Robotics", "Other"]}, {"id": "pubmed_41866341", "title": "Wild genes to the rescue: High-throughput genomics reveals the wild source of broomrape resistance in sunflower.", "authors": ["Sisou D", "Ziadna H", "Eizenberg-Weiss M"], "journal": "Journal of experimental botany", "date": "2026 Mar 23", "url": "https://pubmed.ncbi.nlm.nih.gov/41866341/", "score": 8, "summary": "This research identifies the specific genes from wild sunflower relatives that confer resistance to broomrape, a devastating parasitic weed. Using high-throughput genomics, the researchers pinpointed the genetic source for breeding into cultivated sunflowers.", "opportunity": "Developing broomrape-resistant sunflower varieties through marker-assisted breeding or genetic engineering offers a significant opportunity to reduce crop losses and improve agricultural yields, particularly in regions heavily impacted by this parasite.", "fields": ["AgriTech", "Genomics", "Synthetic Biology"]}, {"id": "pubmed_41857451", "title": "ctDNA monitoring using tumor-informed copy number analysis.", "authors": ["Zhou Z", "Cutts R", "Hrebien S"], "journal": "EMBO molecular medicine", "date": "2026 Mar 19", "url": "https://pubmed.ncbi.nlm.nih.gov/41857451/", "score": 8, "summary": "This research focuses on improving the detection of circulating tumor DNA (ctDNA) by using a copy number analysis approach informed by the tumor's specific genetic makeup. More accurate ctDNA monitoring can provide earlier cancer detection, track treatment response, and identify minimal residual disease.", "opportunity": "Developing a highly sensitive and specific ctDNA monitoring assay based on tumor-informed copy number analysis presents a significant commercial opportunity for personalized cancer management and companion diagnostics.", "fields": ["Diagnostics", "Genomics", "Clinical", "Drug Discovery"]}, {"id": "pubmed_41849350", "title": "A single-cell CRISPR screen defines a gene regulatory network governing human pluripotency in primed and naive cells.", "authors": ["Keshet G", "Benvenisty N"], "journal": "Cell reports", "date": "2026 Mar 17", "url": "https://pubmed.ncbi.nlm.nih.gov/41849350/", "score": 8, "summary": "This research uses CRISPR screening at the single-cell level to map out the genes controlling pluripotency â the ability of cells to become any cell type â in both primed and naive human embryonic stem cells. Understanding this gene regulatory network provides a detailed blueprint for controlling cell fate, which is crucial for regenerative medicine and cell-based therapies.", "opportunity": "Developing highly efficient and targeted differentiation protocols based on this network could significantly reduce the cost and improve the scalability of producing specific cell types for therapeutic applications, creating a valuable platform for cell therapy companies.", "fields": ["Drug Discovery", "Genomics", "Synthetic Biology", "Clinical"]}, {"id": "pubmed_41834792", "title": "4D printing of fully programmable sheets of digital metamaterials.", "authors": ["Levin I", "Sachyani E", "Lieberman R"], "journal": "Soft matter", "date": "2026 Mar 16", "url": "https://pubmed.ncbi.nlm.nih.gov/41834792/", "score": 8, "summary": "This research demonstrates a new method for creating 'digital metamaterials' â materials engineered to have properties not found in nature â using a 4D printing process that allows for programmable changes in shape and function over time. The key innovation is the ability to create complex, fully programmable sheets with dynamic mechanical properties.", "opportunity": "Commercialization focuses on creating adaptable materials for soft robotics, advanced medical implants, or responsive packaging, offering customized performance based on environmental stimuli.", "fields": ["Materials", "Medical Device", "Robotics", "Other"]}, {"id": "epmc_41851172", "title": "InterFeat: a pipeline for finding interesting scientific features.", "authors": ["Dan Ofer", "Michal Linial", "Dafna Shahaf"], "journal": "", "date": "2026-03-18", "url": "https://europepmc.org/article/MED/41851172", "score": 7, "summary": "InterFeat is a computational pipeline designed to automatically identify potentially significant 'features' within scientific datasets, likely relating to experimental results or observations. This tool aims to reduce the burden of manual feature selection, potentially accelerating scientific discovery by highlighting areas for further investigation.", "opportunity": "Licensing or commercializing InterFeat as a software-as-a-service (SaaS) platform for research institutions and biotech/agritech companies could significantly reduce R&D timelines and costs by automating a crucial, often bottlenecked, step in data analysis.", "fields": ["Software/AI", "Drug Discovery", "Genomics", "AgriTech"]}, {"id": "epmc_41850325", "title": "Device Performance and Parental Perception of the Skincubator 2.0, a Wearable Device to Support Prolonged Skin-to-Skin Care for Preterm Infants.", "authors": ["Itamar Nitzan", "Raylene Phillips", "Iris Morag"], "journal": "", "date": "2026-03-18", "url": "https://europepmc.org/article/MED/41850325", "score": 7, "summary": "This study evaluates the Skincubator 2.0, a wearable device designed to enable prolonged skin-to-skin contact for preterm infants, addressing safety and logistical challenges. Results show promising transfer pad performance and high parental satisfaction compared to traditional skin-to-skin care.", "opportunity": "Commercialization of the Skincubator could significantly improve neonatal care, reducing morbidity and mortality in preterm infants while enhancing the parent-child bonding experience, creating a market for a specialized medical device.", "fields": ["Medical Device", "Clinical", "Other"]}, {"id": "epmc_41841803", "title": "Growth phase-specific induction of a viable but nonculturable (VBNC) state in <i>Listeria innocua</i> in response to a green food sanitizer. ", "authors": ["Esther W Mwangi", "Moshe Shemesh", "Victor Rodov"], "journal": "", "date": "2026-03-17", "url": "https://europepmc.org/article/MED/41841803", "score": 7, "summary": "This research demonstrates that a green food sanitizer induces a 'viable but nonculturable' (VBNC) state in *Listeria innocua*, meaning the bacteria appear alive but cannot reproduce under standard conditions. The study highlights differences in how bacteria respond to the sanitizer depending on their growth phase, with stationary-phase cells showing a more resilient VBNC state.", "opportunity": "Developing and optimizing this triple formulation (TF) as a food preservation technology could offer a sustainable alternative to traditional sanitizers, potentially extending shelf life and reducing food waste while addressing consumer demand for natural food processing methods.", "fields": ["FoodTech", "AgriTech", "Diagnostics", "Other"]}, {"id": "epmc_41843794", "title": "Phase 1b study of ABBV-744, a novel, selective BET inhibitor, as monotherapy in patients with myelofibrosis.", "authors": ["John O Mascarenhas", "Laura Maria Fogliatto", "Steven D Green"], "journal": "", "date": "2026-03-17", "url": "https://europepmc.org/article/MED/41843794", "score": 7, "summary": "This study evaluates ABBV-744, a new BET inhibitor, in patients with myelofibrosis who have already tried standard JAK inhibitor treatments. While all patients experienced side effects, the drug shows potential for improving outcomes in a difficult-to-treat blood cancer where current therapies have limitations.", "opportunity": "Developing novel therapies for myelofibrosis, particularly those addressing the limitations of JAK inhibitors and targeting disease modification, represents a significant commercial opportunity given the unmet medical need and potential for premium pricing.", "fields": ["Drug Discovery", "Clinical", "Immunology", "Genomics"]}, {"id": "epmc_41839847", "title": "Synchronous activation of striatal cholinergic interneurons induces local serotonin release.", "authors": ["Lior Matityahu", "Zachary B Hobel", "Noa Berkowitz"], "journal": "", "date": "2026-03-16", "url": "https://europepmc.org/article/MED/41839847", "score": 7, "summary": "This research reveals a previously unknown link between brain cells that use acetylcholine and those that use serotonin, specifically in a brain region called the striatum. The study shows that activating acetylcholine-producing cells can directly trigger serotonin release, and this process is disrupted in a mouse model of obsessive-compulsive disorder.", "opportunity": "Targeting this acetylcholine-serotonin interaction with novel small molecule drugs could offer a new therapeutic approach for neuropsychiatric disorders like OCD, anxiety, and potentially depression.", "fields": ["Drug Discovery", "Neuroscience", "Clinical"]}, {"id": "pubmed_41870456", "title": "Image-Guided Robotic-Assisted Waterjet Ablation of Prostate (Aquablation) Versus Convective Water Vapor Thermal Therapy (Rezūm) in Patients with Prostate Volume Less than 80 Grams.", "authors": ["Perez D", "Mamber A", "Pasherstnik M"], "journal": "Journal of laparoendoscopic & advanced surgical techniques. Part A", "date": "2026 Mar 23", "url": "https://pubmed.ncbi.nlm.nih.gov/41870456/", "score": 7, "summary": "This study compares two minimally invasive procedures, Aquablation and Rezūm, for treating enlarged prostates in men with smaller prostate volumes. The research aims to determine which method offers better outcomes for this specific patient population.", "opportunity": "Further refinement and data supporting Aquablation’s efficacy, particularly in the sub-80g prostate volume segment, could drive increased adoption and market share against Rezūm and other BPH treatments, representing a significant opportunity for the developing company.", "fields": ["Medical Device", "Clinical", "Imaging", "Other"]}, {"id": "pubmed_41698741", "title": "Imaging mammalian lipids using desorption electrospray ionization mass spectrometry: A review.", "authors": ["Abu Ghoush R", "Geday F", "Alon O"], "journal": "Analytica chimica acta", "date": "2026 Mar 22", "url": "https://pubmed.ncbi.nlm.nih.gov/41698741/", "score": 7, "summary": "This review focuses on using desorption electrospray ionization mass spectrometry (DESI-MS) to visualize lipids within mammalian tissues. DESI-MS offers label-free imaging of lipids with high spatial resolution, providing insights into their distribution and composition.", "opportunity": "Developing and commercializing DESI-MS based imaging services or instruments for pharmaceutical companies and research institutions could accelerate lipidomics research and drug development targeting metabolic diseases.", "fields": ["Diagnostics", "Drug Discovery", "Imaging", "Proteomics"]}, {"id": "pubmed_41860429", "title": "Extremity hemorrhage control in urban warfare: A retrospective analysis of the Swords of Iron War.", "authors": ["Epstein D", "Kvint O", "Shlaifer A"], "journal": "The journal of trauma and acute care surgery", "date": "2026 Mar 20", "url": "https://pubmed.ncbi.nlm.nih.gov/41860429/", "score": 7, "summary": "This retrospective analysis examines hemorrhage control techniques used during the recent conflict in Israel, focusing on extremity wounds. Understanding the effectiveness of different interventions in a high-stress, real-world combat environment is crucial for improving trauma care protocols.", "opportunity": "Development and refinement of advanced tourniquets, hemostatic agents, and rapid training programs for civilian and military personnel represent a significant commercial opportunity, particularly focusing on ease-of-use and effectiveness in austere conditions.", "fields": ["Medical Device", "Clinical", "Materials", "Software/AI"]}, {"id": "pubmed_41851172", "title": "InterFeat: a pipeline for finding interesting scientific features.", "authors": ["Ofer D", "Linial M", "Shahaf D"], "journal": "Scientific reports", "date": "2026 Mar 18", "url": "https://pubmed.ncbi.nlm.nih.gov/41851172/", "score": 7, "summary": "InterFeat is a computational pipeline designed to automatically identify potentially significant 'features' within scientific datasets, likely relating to experimental results or observations. This tool aims to reduce the burden of manual feature selection, potentially accelerating scientific discovery by highlighting areas for further investigation.", "opportunity": "Licensing InterFeat as a software platform or developing it into a SaaS offering for research institutions and biotech/agritech companies could significantly reduce R&D time and costs by automating early-stage data analysis.", "fields": ["Software/AI", "Drug Discovery", "Genomics", "Proteomics"]}, {"id": "pubmed_41850325", "title": "Device Performance and Parental Perception of the Skincubator 2.0, a Wearable Device to Support Prolonged Skin-to-Skin Care for Preterm Infants.", "authors": ["Nitzan I", "Phillips R", "Morag I"], "journal": "American journal of perinatology", "date": "2026 Mar 18", "url": "https://pubmed.ncbi.nlm.nih.gov/41850325/", "score": 7, "summary": "This research focuses on a wearable device, the 'Skincubator 2.0', designed to facilitate extended skin-to-skin contact (kangaroo care) for premature infants. The study assesses both the device's functionality and how parents perceive its usability and benefits.", "opportunity": "Commercialization potential lies in a more convenient and reliable solution for promoting kangaroo care, potentially reducing NICU costs and improving infant outcomes, creating a market for specialized neonatal medical devices.", "fields": ["Medical Device", "Clinical", "Other", "Software/AI"]}, {"id": "pubmed_41843794", "title": "Phase 1b study of ABBV-744, a novel, selective BET inhibitor, as monotherapy in patients with myelofibrosis.", "authors": ["Mascarenhas JO", "Fogliatto LM", "Green SD"], "journal": "Blood advances", "date": "2026 Mar 17", "url": "https://pubmed.ncbi.nlm.nih.gov/41843794/", "score": 7, "summary": "This study investigates ABBV-744, a new drug targeting BET proteins, in patients with myelofibrosis, a rare bone marrow disorder. The phase 1b trial assesses the drug's safety and potential effectiveness when used alone, providing early clinical data on a novel therapeutic approach.", "opportunity": "Successful development of ABBV-744 could establish a new treatment option for myelofibrosis, a market with significant unmet needs and potential for premium pricing, and potentially expand to other BET-driven cancers.", "fields": ["Drug Discovery", "Clinical", "Immunology", "Genomics"]}, {"id": "pubmed_41841803", "title": "Growth phase-specific induction of a viable but nonculturable (VBNC) state in Listeria innocua in response to a green food sanitizer.", "authors": ["Mwangi EW", "Shemesh M", "Rodov V"], "journal": "Microbiology spectrum", "date": "2026 Mar 17", "url": "https://pubmed.ncbi.nlm.nih.gov/41841803/", "score": 7, "summary": "This research demonstrates that *Listeria innocua* can enter a viable but nonculturable (VBNC) state when exposed to a green food sanitizer, meaning the bacteria are still alive but undetectable by standard growth-based methods. Understanding how sanitizers induce this VBNC state is crucial, as these bacteria could still pose a risk despite testing negative in traditional food safety assessments.", "opportunity": "Developing improved food safety testing methods that detect VBNC *Listeria* â or sanitizers that reliably eliminate it â represents a significant commercial opportunity to reduce foodborne illness and improve consumer confidence.", "fields": ["FoodTech", "AgriTech", "Diagnostics", "Other"]}, {"id": "epmc_41865382", "title": "Investigating user satisfaction, usage characteristics, and early abandonment of customized assistive devices for children and young adults. ", "authors": ["Yifah Swisa", "Naomi Weintraub", "Naomi Gefen"], "journal": "", "date": "2026-03-22", "url": "https://europepmc.org/article/MED/41865382", "score": 6, "summary": "This study investigates why customized assistive devices are often abandoned by children and young adults, finding a 37% abandonment rate linked to dissatisfaction and perceived lack of quality of life improvement. Understanding these factors is crucial for improving the design, fitting, and ongoing support of these devices.", "opportunity": "Developing predictive analytics or AI-driven tools to assess device suitability *before* customization, and providing personalized support post-fitting, could significantly reduce abandonment rates and improve patient outcomes, creating a valuable service offering for AT providers.", "fields": ["Medical Device", "Clinical", "Software/AI", "Other"]}, {"id": "epmc_41861376", "title": "Comment on: Evidence-based functional classification of simultaneous vision intraocular lenses: seeking a global consensus by the ESCRS Functional Vision Working Group.", "authors": ["Benjamin Stern", "Damien Gatinel"], "journal": "", "date": "2026-03-20", "url": "https://europepmc.org/article/MED/41861376", "score": 6, "summary": "This paper is a comment on existing work attempting to standardize the functional classification of intraocular lenses (IOLs) used in cataract surgery. It suggests a need for further refinement and consensus in how these lenses are categorized based on the vision they provide to patients.", "opportunity": "Developing AI-powered tools to objectively assess and predict IOL performance based on patient-specific data could significantly improve surgical outcomes and patient satisfaction, creating a valuable niche in the ophthalmic device market.", "fields": ["Medical Device", "Clinical", "Software/AI", "Imaging"]}, {"id": "epmc_41860429", "title": "Extremity hemorrhage control in urban warfare: A retrospective analysis of the Swords of Iron War.", "authors": ["Danny Epstein", "Ori Kvint", "Amir Shlaifer"], "journal": "", "date": "2026-03-20", "url": "https://europepmc.org/article/MED/41860429", "score": 6, "summary": "This retrospective study analyzed tourniquet use in Israeli soldiers during the recent conflict, finding nearly 28% required them and identifying factors predicting when tourniquets couldn't be removed due to severe vascular damage. The research highlights the need for improved pre-hospital hemorrhage control strategies and potentially faster surgical intervention.", "opportunity": "Development of advanced pre-hospital assessment tools (potentially AI-powered imaging or biosensors) to rapidly identify non-convertible tourniquets and prioritize immediate surgical intervention could significantly reduce limb loss and improve patient outcomes.", "fields": ["Medical Device", "Clinical", "Software/AI", "Imaging"]}, {"id": "epmc_41862437", "title": "Distinct roles of cortical layer 5 subtypes in associative learning.", "authors": ["Sara Moberg", "Michele Garibbo", "Camille Mazo"], "journal": "", "date": "2026-03-20", "url": "https://europepmc.org/article/MED/41862437", "score": 6, "summary": "This research clarifies how different types of neurons in the brain's cortex contribute to learning associations between stimuli and rewards. Specifically, it shows that one neuron type maintains stable sensory information while another tracks reward anticipation, both being crucial for adaptive behavior.", "opportunity": "Understanding the distinct roles of these neuron subtypes could lead to targeted therapies or neuromodulation techniques to enhance learning and memory in conditions like PTSD, addiction, or age-related cognitive decline.", "fields": ["Neuroscience", "Software/AI", "Drug Discovery", "Imaging"]}, {"id": "epmc_41854243", "title": "Carrier Dynamics of Strongly Confined CsPbI&lt;sub&gt;3&lt;/sub&gt; Nanowires.", "authors": ["Alexander M Oddo", "Hanguk Cho", "Rohit Rana"], "journal": "", "date": "2026-03-19", "url": "https://europepmc.org/article/MED/41854243", "score": 6, "summary": "This research investigates how the shape of cesium lead iodide nanocrystals (nanowires vs. quantum dots) impacts how quickly light is emitted and lost as heat. Nanowires show faster light emission but also faster energy loss, linked to imperfections in the material, impacting overall efficiency.", "opportunity": "Optimizing the dimensionality of these perovskite nanocrystals presents an opportunity to improve the efficiency of next-generation LEDs and solar cells, potentially leading to more cost-effective and powerful optoelectronic devices.", "fields": ["Materials", "Clean Energy", "Imaging"]}, {"id": "epmc_41856500", "title": "Thrombotic and Bleeding Complications in Myeloproliferative Neoplasms: An Integrated Clinical Perspective.", "authors": ["Omri Cohen", "Martin Ellis"], "journal": "", "date": "2026-03-19", "url": "https://europepmc.org/article/MED/41856500", "score": 6, "summary": "Myeloproliferative neoplasms (MPNs) cause a dangerous imbalance of clotting and bleeding risks, and current management is difficult. This review details the complex interplay of factors driving these risks and summarizes current treatment approaches.", "opportunity": "Developing improved diagnostics for early MPN detection, particularly focusing on unusual thrombosis sites, could lead to earlier intervention and better patient outcomes, creating a market for novel biomarkers or imaging techniques.", "fields": ["Drug Discovery", "Diagnostics", "Clinical", "Genomics"]}, {"id": "epmc_41851791", "title": "The impact of bronchoscopy on the safety of percutaneous tracheostomy: a randomized controlled trial.", "authors": ["Akiva Nachshon", "Avishai Shapiro", "Smadar Goldfarb"], "journal": "", "date": "2026-03-18", "url": "https://europepmc.org/article/MED/41851791", "score": 6, "summary": "This study investigates whether using bronchoscopy during percutaneous tracheostomy (a surgical airway creation) improves patient safety. The research uses a randomized controlled trial to compare outcomes with and without bronchoscopic guidance.", "opportunity": "Development of improved, potentially automated, bronchoscopy guidance systems (hardware or software) could reduce complications and improve the safety profile of percutaneous tracheostomy, creating a market for enhanced procedural tools.", "fields": ["Medical Device", "Clinical", "Imaging", "Software/AI"]}, {"id": "epmc_41851403", "title": "Lipidomics of allantoic fluid collected by allantocentesis indicates a possible mechanism underlying partial litter loss in multifetal pregnancies of ewes.", "authors": ["Tamir Alon", "Maya Ross", "Jen Spirer"], "journal": "", "date": "2026-03-18", "url": "https://europepmc.org/article/MED/41851403", "score": 6, "summary": "This study identifies metabolic differences in ewes experiencing fetal loss during pregnancy, specifically focusing on the composition of allantoic fluid and maternal hormone levels. The research suggests a link between altered lipid metabolism, placental gene expression (androgen receptor), and partial litter loss in sheep.", "opportunity": "Developing a diagnostic test based on allantoic fluid lipidomics or maternal blood biomarkers (like β-hydroxybutyrate) could allow for early intervention in sheep breeding to reduce fetal loss and improve reproductive efficiency.", "fields": ["Diagnostics", "AgriTech", "Genomics", "Proteomics"]}, {"id": "epmc_41843818", "title": "Bias and Its Control in Stochastic Approaches to Electronic-Structure Theory.", "authors": ["Pavel Savchenko", "Sayak Adhikari", "Efrat Hadad"], "journal": "", "date": "2026-03-17", "url": "https://europepmc.org/article/MED/41843818", "score": 6, "summary": "This research addresses a fundamental challenge in computational chemistry – the trade-off between accuracy and computational cost when using stochastic methods to model electronic structure. By improving bias control in these stochastic approaches, the researchers enable more reliable and efficient simulations of complex systems.", "opportunity": "Developing and licensing improved stochastic methods for electronic structure calculations could accelerate materials discovery, drug design, and clean energy research by reducing the computati ivity in agricultural or industrial settings.", "fields": ["AgriTech", "Synthetic Biology", "Drug Discovery", "Materials"]}, {"id": "pubmed_41206719", "title": "Mycoplasma pneumoniae-Associated Cardiac Complications Revisited.", "authors": ["Grupel D", "Nir-Paz R", "Oster Y"], "journal": "Clinical infectious diseases : an official publication of the Infectious Diseases Society of America", "date": "2026 Mar 17", "url": "https://pubmed.ncbi.nlm.nih.gov/41206719/", "score": 6, "summary": "This research revisits the link between *Mycoplasma pneumoniae* infection and cardiac complications, suggesting a potentially underrecognized connection. Understanding the mechanisms behind this association could lead to better diagnosis and treatment of heart issues in patients with atypical pneumonia.", "opportunity": "Developing a rapid diagnostic test to identify cardiac risk in *Mycoplasma pneumoniae* infected patients could improve patient outcomes and reduce healthcare costs associated with delayed diagnosis of cardiac events.", "fields": ["Diagnostics", "Immunology", "Clinical", "Drug Discovery"]}, {"id": "pubmed_41840675", "title": "Commentary on a recent published study on endometrial receptivity assessment.", "authors": ["Or Y", "Tur-Kaspa I", "Kolatt TS"], "journal": "Reproductive biology and endocrinology : RB&E", "date": "2026 Mar 16", "url": "https://pubmed.ncbi.nlm.nih.gov/41840675/", "score": 6, "summary": "This paper is a commentary on research regarding endometrial receptivity assessment, which is crucial for successful IVF and implantation. Improved assessment methods could significantly increase success rates for individuals undergoing assisted reproductive technologies.", "opportunity": "Developing a more accurate and accessible endometrial receptivity assessment tool presents a commercial opportunity to improve IVF outcomes and reduce the emotional and financial burden on patients.", "fields": ["Diagnostics", "Clinical", "Software/AI", "Genomics"]}, {"id": "pubmed_41840489", "title": "Progressive endocannabinoid system dysregulation in autosomal dominant polycystic kidney disease.", "authors": ["Betkar S", "Nemirovski A", "Ruppo S"], "journal": "Molecular medicine (Cambridge, Mass.)", "date": "2026 Mar 16", "url": "https://pubmed.ncbi.nlm.nih.gov/41840489/", "score": 6, "summary": "This research indicates a connection between the endocannabinoid system and the progression of Autosomal Dominant Polycystic Kidney Disease (ADPKD), a common genetic kidney disorder. Dysregulation of this system appears to worsen the disease, suggesting it could be a potential therapeutic target.", "opportunity": "Developing therapies that modulate the endocannabinoid system could slow the progression of ADPKD and improve patient outcomes, representing a novel treatment approach for a significant unmet medical need.", "fields": ["Drug Discovery", "Clinical", "Genomics", "Other"]}, {"id": "pubmed_41839847", "title": "Synchronous activation of striatal cholinergic interneurons induces local serotonin release.", "authors": ["Matityahu L", "Hobel ZB", "Berkowitz N"], "journal": "Nature communications", "date": "2026 Mar 16", "url": "https://pubmed.ncbi.nlm.nih.gov/41839847/", "score": 6, "summary": "This research demonstrates a direct link between activating cholinergic interneurons in the striatum and the subsequent release of serotonin locally within that brain region. Understanding this synchronous activation pathway could reveal novel mechanisms underlying neurological and psychiatric disorders.", "opportunity": "Targeting this cholinergic-serotonin pathway presents a potential avenue for developing more precise and effective therapies for conditions like depression, Parkinson's disease, or addiction, potentially bypassing systemic side effects.", "fields": ["Drug Discovery", "Neuroscience", "Clinical"]}];
document.getElementById('updated').textContent = 'Updated 2026-03-23';
let activeScore='all', activeField='all', sortBy='score', searchQ='';
function scoreClass(s){return s>=8?'score-high':s>=6?'score-mid':'score-low';}
function render(){
  let list=papers.slice();
  if(searchQ){const q=searchQ.toLowerCase();list=list.filter(p=>(p.title||'').toLowerCase().includes(q)||(p.summary||'').toLowerCase().includes(q)||(p.opportunity||'').toLowerCase().includes(q));}
  if(activeScore!=='all')list=list.filter(p=>p.score>=parseInt(activeScore));
  if(activeField!=='all')list=list.filter(p=>(p.fields||[]).includes(activeField));
  list.sort(sortBy==='score'?(a,b)=>b.score-a.score:(a,b)=>(b.date||'').localeCompare(a.date||''));
  document.getElementById('count').textContent=list.length+' paper'+(list.length!==1?'s':'')+' shown';
  const grid=document.getElementById('grid');
  if(!list.length){grid.innerHTML='<div class="empty">No papers match.</div>';return;}
  grid.innerHTML=list.map(p=>{
    const tags=(p.fields||[]).map(f=>`<span class="tag">${f}</span>`).join('');
    const authors=(p.authors||[]).join(', ');
    return `<div class="card">
      <div class="card-header"><div class="title">${p.title}</div><div class="score ${scoreClass(p.score)}">${p.score}</div></div>
      <div class="meta">${authors?authors+' · ':''}${p.journal||''}${p.date?' · '+p.date:''}</div>
      ${p.summary?`<div class="summary">${p.summary}</div>`:''}
      ${p.opportunity?`<div class="opportunity">${p.opportunity}</div>`:''}
      ${tags?`<div class="tags">${tags}</div>`:''}
      <div class="actions"><a class="btn" href="${p.url}" target="_blank">Open Paper</a></div>
    </div>`;
  }).join('');
}
document.querySelectorAll('.chip').forEach(b=>b.addEventListener('click',()=>{
  const f=b.dataset.filter,v=b.dataset.val;
  document.querySelectorAll(`.chip[data-filter="${f}"]`).forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  if(f==='score')activeScore=v; else activeField=v;
  render();
}));
document.getElementById('sort').addEventListener('change',e=>{sortBy=e.target.value;render();});
document.getElementById('search').addEventListener('input',e=>{searchQ=e.target.value.trim();render();});
render();
</script>
