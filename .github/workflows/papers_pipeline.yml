name: Weekly HUJI Paper Evaluation Pipeline

on:
  schedule:
    - cron: '0 3 * * 1'      # 03:00 UTC every Monday
  workflow_dispatch:          # manual trigger button

jobs:
  evaluate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run paper evaluation pipeline
        env:
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
        run: python papers_pipeline.py

      - name: Commit & push outputs
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name  "Papers-Bot"
          git config user.email "bot@users.noreply.github.com"
          git add papers_reader.html papers_data.json
          git diff --staged --quiet || \
            (git commit -m "Weekly HUJI papers update $(date -u '+%Y-%m-%d')" && \
             git push "https://${GH_TOKEN}@github.com/${{ github.repository }}.git" HEAD:master)
