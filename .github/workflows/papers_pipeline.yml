name: Papers Pipeline

on:
  schedule:
    - cron: '0 6 * * 1'   # every Monday at 06:00 UTC
  workflow_dispatch:
    inputs:
      period:
        description: 'Fetch window label used by the pipeline parser'
        required: false
        default: 'month'
        type: choice
        options: [week, month]
      days_back:
        description: 'Actual fetch window in days. Use for a multi-month backfill.'
        required: false
        default: '90'
        type: string
      max_results:
        description: 'Maximum papers to request per source. Kept modest — free-tier Gemini rate limits (~15 RPM) are the real bottleneck, not source limits.'
        required: false
        default: '300'
        type: string
      backfill_metadata:
        description: 'One-off: refresh pi_affiliation/date precision for existing papers only (skips fetching new papers and re-evaluating scores)'
        required: false
        default: false
        type: boolean
      reeval_to_gemma:
        description: 'One-off: re-score papers not currently scored by Gemma (gemini/groq) using Gemma only (skips fetching new papers). Safe to repeat. Also runs automatically once a day — see reeval_to_gemma.yml.'
        required: false
        default: false
        type: boolean

concurrency:
  group: papers-pipeline
  cancel-in-progress: false   # let an in-flight run finish rather than corrupt a half-written sheet

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 180   # fail predictably instead of GitHub's silent 6h default; checkpointing means most progress still saves
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve run window
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "PIPELINE_PERIOD=week" >> "$GITHUB_ENV"
            echo "DAYS_BACK=7" >> "$GITHUB_ENV"
            echo "MAX_RESULTS=50" >> "$GITHUB_ENV"
          else
            echo "PIPELINE_PERIOD=${{ github.event.inputs.period || 'month' }}" >> "$GITHUB_ENV"
            echo "DAYS_BACK=${{ github.event.inputs.days_back || '90' }}" >> "$GITHUB_ENV"
            echo "MAX_RESULTS=${{ github.event.inputs.max_results || '300' }}" >> "$GITHUB_ENV"
          fi
          echo "BACKFILL_METADATA=${{ github.event.inputs.backfill_metadata || 'false' }}" >> "$GITHUB_ENV"
          echo "REEVAL_TO_GEMMA=${{ github.event.inputs.reeval_to_gemma || 'false' }}" >> "$GITHUB_ENV"

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MAX_RESULTS: ${{ env.MAX_RESULTS }}
          DAYS_BACK: ${{ env.DAYS_BACK }}
          BACKFILL_METADATA: ${{ env.BACKFILL_METADATA }}
          REEVAL_TO_GEMMA: ${{ env.REEVAL_TO_GEMMA }}
        run: |
          set -o pipefail
          EXTRA_ARGS=""
          if [ "$BACKFILL_METADATA" = "true" ]; then EXTRA_ARGS="--backfill-metadata"; fi
          if [ "$REEVAL_TO_GEMMA" = "true" ]; then EXTRA_ARGS="$EXTRA_ARGS --reeval-to-gemma"; fi
          python -u papers_pipeline.py --period "$PIPELINE_PERIOD" $EXTRA_ARGS 2>&1 | tee pipeline_run.log

      - name: Commit generated HTML
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage only the files this job generates, then rebase them onto the
          # *current* origin/main (not the commit this job started from) so a
          # long-running job that finishes after other PRs/merges land can't
          # silently revert unrelated files back to its stale checkout — a
          # plain `git reset --soft origin/main` + partial `git add` does
          # exactly that, since everything not re-added stays at the old
          # checkout's content. See the "chore" incident of 2026-07-05.
          mkdir -p /tmp/gen
          cp -f papers_reader.html papers_data.json index.html pipeline_run.log /tmp/gen/ 2>/dev/null || true
          git fetch origin main
          git checkout -B main origin/main
          cp -f /tmp/gen/* . 2>/dev/null || true
          git add papers_reader.html papers_data.json index.html pipeline_run.log || true
          git diff --cached --quiet || git commit -m "chore: update papers [$(date -u +%Y-%m-%d)]"
          git push origin HEAD:main
