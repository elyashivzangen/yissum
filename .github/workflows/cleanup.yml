name: Bimonthly Cleanup

on:
  schedule:
    - cron: '0 7 1 */2 *'   # 1st of every 2nd month at 07:00 UTC
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run cleanup
        env:
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
        run: python cleanup.py 2>&1 | tee cleanup_run.log

      - name: Commit updated HTML
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add papers_reader.html papers_data.json cleanup_run.log || true
          git diff --cached --quiet || git commit -m "chore: bimonthly cleanup $(date -u +%Y-%m-%d)"
          git push
