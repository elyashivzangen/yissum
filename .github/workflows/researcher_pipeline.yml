name: Researcher Pipeline

on:
  schedule:
    - cron: '0 11 * * 1'   # every Monday at 11:00 UTC — after papers_pipeline.yml (06:00, up to 180min) and weekly_digest.yml (09:00), so this week's newly-fetched papers are already scored and in the Sheet
  workflow_dispatch:
    inputs:
      top_n:
        description: 'Number of top researchers to profile (ranked by their best paper score).'
        required: false
        default: '20'
        type: string
      years_back:
        description: 'How many years of publication history to fetch per researcher.'
        required: false
        default: '3'
        type: string
      max_papers_per_researcher:
        description: 'Cap on graded papers per researcher (bounds Gemini call volume/runtime).'
        required: false
        default: '15'
        type: string
      papers_snapshot_ref:
        description: 'One-off backfill: git ref/SHA to pull papers_data.json from for candidate selection + known-paper reuse, instead of the live Sheet (e.g. a past weekly commit, to simulate a run from that week). Leave blank for normal behavior.'
        required: false
        default: ''
        type: string

concurrency:
  group: researcher-pipeline
  cancel-in-progress: false   # let an in-flight run finish rather than corrupt a half-written sheet

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 180   # checkpointing means most progress still saves even if this trips
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history — needed so `git show <ref>:papers_data.json` can reach past commits for papers_snapshot_ref backfills

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve papers snapshot
        run: |
          REF="${{ github.event.inputs.papers_snapshot_ref }}"
          if [ -n "$REF" ]; then
            git show "$REF:papers_data.json" > /tmp/papers_snapshot.json
            echo "PAPERS_SNAPSHOT=/tmp/papers_snapshot.json" >> "$GITHUB_ENV"
            echo "Using papers_data.json from $REF for candidate selection."
          else
            echo "PAPERS_SNAPSHOT=" >> "$GITHUB_ENV"
          fi

      - name: Run researcher pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TOP_N_RESEARCHERS: ${{ github.event.inputs.top_n || '20' }}
          YEARS_BACK: ${{ github.event.inputs.years_back || '3' }}
          MAX_PAPERS_PER_RESEARCHER: ${{ github.event.inputs.max_papers_per_researcher || '15' }}
        run: |
          set -o pipefail
          EXTRA_ARGS=""
          if [ -n "$PAPERS_SNAPSHOT" ]; then EXTRA_ARGS="--papers-snapshot $PAPERS_SNAPSHOT"; fi
          python -u researcher_pipeline.py $EXTRA_ARGS 2>&1 | tee researcher_pipeline_run.log

      - name: Commit generated files
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage only the files this job generates, then rebase them onto the
          # *current* origin/main (not the commit this job started from) so a
          # long-running job that finishes after other PRs/merges land can't
          # silently revert unrelated files back to its stale checkout — a
          # plain `git reset --soft origin/main` + partial `git add` does
          # exactly that, since everything not re-added stays at the old
          # checkout's content. See the "chore" incident of 2026-07-05.
          mkdir -p /tmp/gen
          cp -f papers_reader.html papers_data.json researchers_data.json researcher_pipeline_run.log /tmp/gen/ 2>/dev/null || true
          git fetch origin main
          git reset --hard origin/main
          cp -f /tmp/gen/* . 2>/dev/null || true
          git add papers_reader.html papers_data.json researchers_data.json researcher_pipeline_run.log || true
          git diff --cached --quiet || git commit -m "chore: update researcher profiles [$(date -u +%Y-%m-%d)]"
          git push origin HEAD:main
