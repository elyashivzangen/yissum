name: Weekly Research Digest

on:
  schedule:
    - cron: '0 9 * * 1'   # Monday 09:00 UTC — after the main pipeline (06:00)
  workflow_dispatch:        # manual trigger

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate weekly digest PDF
        env:
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          python weekly_digest.py > digest_run.log 2>&1
          echo "exit_code=$?" >> digest_run.log

      - name: Commit results
        if: always()
        run: |
          echo "=== file check ===" && ls -la digest_run.log 2>&1 || echo "digest_run.log missing"
          cat digest_run.log 2>/dev/null || echo "(empty)"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digests/ digest_run.log || true
          git status --short
          git diff --cached --quiet || git commit -m "Weekly digest $(date -u +%Y-%m-%d)"
          git push || true
