name: Weekly Research Digest

on:
  schedule:
    - cron: '0 9 * * 1'   # Monday 09:00 UTC — after the main pipeline (06:00)
  workflow_dispatch:        # manual trigger

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate weekly digest (HTML + PDF)
        env:
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          SMTP_HOST:     ${{ vars.SMTP_HOST }}
          SMTP_PORT:     ${{ vars.SMTP_PORT }}
          SMTP_USER:     elyashiv.zangen.ai@gmail.com
          SMTP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_FROM:     elyashiv.zangen.ai@gmail.com
        run: python -u weekly_digest.py > digest_run.log 2>&1 || echo "Script failed (exit $?)" >> digest_run.log

      - name: Commit PDF and log
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digests/ digest_run.log || true
          git diff --cached --quiet || git commit -m "Weekly digest $(date -u +%Y-%m-%d)"
          # Pull-rebase before push so a concurrent digest run (e.g. monthly) doesn't
          # cause a non-fast-forward rejection.
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && break
            echo "push attempt $i failed, retrying..."; sleep $((i*3))
          done
