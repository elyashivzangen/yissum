name: Monthly Research Digest

on:
  schedule:
    - cron: '0 10 1 * *'   # 1st of every month at 10:00 UTC
  workflow_dispatch:        # manual trigger

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate monthly digest PDF
        env:
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python weekly_digest.py --monthly > digest_run.log 2>&1 || echo "Script failed (exit $?)" >> digest_run.log

      - name: Commit PDF and log
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digests/ digest_run.log || true
          git diff --cached --quiet || git commit -m "Monthly digest $(date -u +%Y-%m)"
          git push
